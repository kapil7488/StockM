<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="80" y="300" width="48" height="120" rx="8" fill="url(#accent)" opacity="0.6"/>
  <rect x="148" y="250" width="48" height="170" rx="8" fill="url(#accent)" opacity="0.7"/>
  <rect x="216" y="200" width="48" height="220" rx="8" fill="url(#accent)" opacity="0.8"/>
  <rect x="284" y="160" width="48" height="260" rx="8" fill="url(#green)" opacity="0.9"/>
  <rect x="352" y="110" width="48" height="310" rx="8" fill="url(#green)"/>
  <!-- Trend line -->
  <polyline points="104,280 172,230 240,180 308,140 376,90" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow up -->
  <polygon points="376,90 360,120 392,120" fill="#f59e0b"/>
  <!-- S M text -->
  <text x="256" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle" letter-spacing="8">StockM</text>
</svg>
