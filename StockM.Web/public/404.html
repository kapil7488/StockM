<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Redirecting…</title>
<script>
  // GitHub Pages SPA redirect: turns 404 paths into query strings
  // so index.html can pick them up and restore the route.
  var seg = location.pathname.split('/').length;
  var loc = location.href;
  location.replace(
    loc.split('/').slice(0, seg < 3 ? 3 : seg).join('/') +
    '/?/' + loc.split('/').slice(seg < 3 ? 3 : seg).join('/').replace(/&/g, '~and~') +
    (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
    location.hash
  );
</script>
</head>
<body></body>
</html>
