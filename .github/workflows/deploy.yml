name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StockM.Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: StockM.Web/package-lock.json

      - run: npm ci

      - name: Build
        run: npx vite build --base /${{ github.event.repository.name }}/
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_AV_KEY: ${{ vars.VITE_AV_KEY }}
          VITE_FINNHUB_KEY: ${{ vars.VITE_FINNHUB_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: StockM.Web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
