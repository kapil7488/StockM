name: Build Android APK

on:
  workflow_dispatch:    # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'StockM.Web/src/**'
      - 'StockM.Web/android/**'
      - 'StockM.Web/package.json'
      - 'StockM.Web/capacitor.config.ts'
      - '.github/workflows/android-build.yml'

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StockM.Web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: StockM.Web/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx vite build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: StockM.Web/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockM-debug-apk
          path: StockM.Web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release:
    name: Build Release APK (unsigned)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StockM.Web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: StockM.Web/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx vite build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: StockM.Web/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: StockM-release-apk
          path: StockM.Web/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
