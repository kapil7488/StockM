name: Build Android APK

on:
  workflow_dispatch:    # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'StockM.Web/src/**'
      - 'StockM.Android/**'
      - '.github/workflows/android-build.yml'

jobs:
  build-apk:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Build the web app (StockM.Web) ──
      - name: Install web dependencies
        working-directory: StockM.Web
        run: npm ci

      - name: Build web app
        working-directory: StockM.Web
        run: npx vite build

      # ── Prepare Android project (StockM.Android) ──
      - name: Install Android wrapper dependencies
        working-directory: StockM.Android
        run: npm ci

      - name: Copy web dist to Android
        working-directory: StockM.Android
        run: node scripts/copy-dist.js

      - name: Sync Capacitor Android
        working-directory: StockM.Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x StockM.Android/android/gradlew

      # ── Build APKs ──
      - name: Build debug APK
        working-directory: StockM.Android/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: StockM.Android/android
        run: ./gradlew assembleRelease --no-daemon

      # ── Upload artifacts ──
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StockM-debug-apk
          path: StockM.Android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: StockM-release-apk
          path: StockM.Android/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
